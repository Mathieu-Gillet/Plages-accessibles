name: Import quotidien des plages

on:
  schedule:
    # 06:00 UTC = 08:00 Paris été / 07:00 Paris hiver.
    # GitHub Actions schedules can drift by 5–15 min during peak load.
    - cron: '0 6 * * *'
  workflow_dispatch:  # Manual trigger button in the Actions tab — useful for testing.
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write       # Required to push the auto/import-* branch and delete it after merge.
  pull-requests: write  # Required to open the PR.

jobs:
  cleanup:
    # Supprime la branche auto/import-* dès que la PR est mergée.
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'auto/import-')
    runs-on: ubuntu-latest
    steps:
      - name: Supprimer la branche après merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          gh api -X DELETE "/repos/${{ github.repository }}/git/refs/heads/${BRANCH}"
          echo "Branche ${BRANCH} supprimée."

  import:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run import script
        id: import
        run: npx tsx scripts/import-plages.ts

      - name: Bail out if no new beaches
        if: steps.import.outputs.added == '0'
        run: |
          echo "Aucune nouvelle plage qualifiée aujourd'hui — pas de PR créée."
          exit 0

      - name: Configure git
        if: steps.import.outputs.added != '0'
        run: |
          git config user.name "plages-import-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Create branch and commit
        if: steps.import.outputs.added != '0'
        id: branch
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="auto/import-${DATE}"
          git checkout -b "$BRANCH"
          git add content/plages/
          git commit -m "auto: ${{ steps.import.outputs.added }} nouvelles plages — ${DATE}"
          # Force push: a previous failed run may have left a stale branch on origin.
          # We own this branch entirely (auto/* namespace), so overwriting is safe.
          git push origin "$BRANCH" --force
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Ensure auto-import label exists
        if: steps.import.outputs.added != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-import \
            --color "0E8A16" \
            --description "PR auto-générée par le workflow d'import quotidien" \
            2>/dev/null || true

      - name: Skip PR creation if one is already open on this branch
        if: steps.import.outputs.added != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER=$(gh pr list --head "${{ steps.branch.outputs.branch }}" --state open --json number --jq '.[0].number // ""')
          if [ -n "$NUMBER" ]; then
            echo "PR #$NUMBER déjà ouverte — le force push l'a mise à jour automatiquement."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open Pull Request
        if: steps.import.outputs.added != '0' && steps.existing.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUGS="${{ steps.import.outputs.slugs }}"
          BULLETS=$(echo "$SLUGS" | tr ',' '\n' | sed 's|^|- `content/plages/|; s|$|.json`|')
          BODY=$(cat <<EOF
          ## Import automatique du ${{ steps.branch.outputs.date }}

          **${{ steps.import.outputs.added }} nouvelles plages** ajoutées par le bot quotidien.

          ### Plages candidates (à reviewer)
          ${BULLETS}

          ### Checklist de review
          - [ ] Nom + commune cohérents
          - [ ] Coordonnées GPS plausibles (zoom sur la carte)
          - [ ] Description claire et factuelle (pas de blabla générique)
          - [ ] Au moins 2 accessibilités documentées par plage
          - [ ] Champ \`verifiedBy\` présent (source labellisée)

          ### Si une plage est douteuse
          Éditer le fichier dans cette PR (icône crayon) → supprimer le fichier indésirable → commit → merger le reste.

          ### Si tout est OK
          Cliquer **Merge pull request** → Vercel rebuild en ~2 min → en ligne sur https://plages-accessibles.fr

          ---
          _Workflow : \`.github/workflows/import-plages.yml\`_
          _Source(s) consultée(s) : handiplage.fr_
          EOF
          )
          gh pr create \
            --base master \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "auto: ${{ steps.import.outputs.added }} nouvelles plages — ${{ steps.branch.outputs.date }}" \
            --body "$BODY" \
            --label "auto-import"
